---
layout: page
---

<div class="tag-search-wrapper mb-4">
  <i class="fas fa-search"></i>
  <input
    id="tag-search"
    type="search"
    class="form-control"
    placeholder="Поиск по играм..."
    autocomplete="off"
  >
</div>

<div id="tags" class="d-flex flex-wrap ml-xl-2 mr-xl-2">
{% assign tags = "" | split: "" %}
{% for t in site.tags %}
{% assign tags = tags | push: t[0] %}
{% endfor %}
{% assign sorted_tags = tags | sort_natural %}
{% for t in sorted_tags %}
<div>
  <a class="tag" href="{{ t | slugify | url_encode | prepend: '/tags/' | append: '/' | relative_url }}">
    {{ t }}<span class="text-muted">{{ site.tags[t].size }}</span>
  </a>
</div>
{% endfor %}
</div>

<style>
.tag-search-wrapper {
  position: relative;
  max-width: 600px;
}

.tag-search-wrapper i {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-muted-color);
}

#tag-search {
  padding-left: 36px;
  background: var(--card-bg);
  border: 1px solid var(--main-border-color);
  color: var(--text-color);
}

#tag-search::placeholder {
  color: var(--text-muted-color);
}
</style>

<script>
const searchInput = document.getElementById('tag-search');
const tags = document.querySelectorAll('#tags .tag');

const romanMap = {
  i:1, ii:2, iii:3, iv:4, v:5,
  vi:6, vii:7, viii:8, ix:9, x:10
};

function normalize(text) {
  text = text
    .toLowerCase()
    .replace(/[-_]/g, ' ')
    .replace(/\s+/g, ' ')
    .trim();

  // заменить римские цифры
  text = text.split(' ').map(word => {
    if (romanMap[word]) return romanMap[word];
    return word;
  }).join(' ');

  return text;
}

searchInput.addEventListener('input', function () {
  const filter = normalize(this.value);

  tags.forEach(tag => {
    const text = normalize(tag.textContent);

    tag.parentElement.style.display =
      text.includes(filter) ? '' : 'none';
  });
});
</script>
