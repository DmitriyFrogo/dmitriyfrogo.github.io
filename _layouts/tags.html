---
layout: page
---

<div class="tag-search-wrapper mb-4">
  <i class="fas fa-search"></i>
  <input
    id="tag-search"
    type="search"
    class="form-control"
    placeholder="Поиск по играм..."
    autocomplete="off"
  >
</div>

<div id="tags" class="d-flex flex-wrap ml-xl-2 mr-xl-2">
{% assign tags = "" | split: "" %}
{% for t in site.tags %}
{% assign tags = tags | push: t[0] %}
{% endfor %}
{% assign sorted_tags = tags | sort_natural %}
{% for t in sorted_tags %}
<div>
  <a class="tag" href="{{ t | slugify | url_encode | prepend: '/tags/' | append: '/' | relative_url }}">
    {{ t }}<span class="text-muted">{{ site.tags[t].size }}</span>
  </a>
</div>
{% endfor %}
</div>

<style>
.tag-search-wrapper {
  position: relative;
  max-width: 600px;
}

.tag-search-wrapper i {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--text-muted-color);
}

#tag-search {
  padding-left: 36px;
  background: var(--card-bg);
  border: 1px solid var(--main-border-color);
  color: var(--text-color);
}

#tag-search::placeholder {
  color: var(--text-muted-color);
}
</style>

<script>
const searchInput = document.getElementById('tag-search');
const tags = document.querySelectorAll('#tags .tag');

function baseNormalize(text) {
  return text
    .toLowerCase()
    .replace(/[-_]/g,' ')
    .replace(/[()]/g,' ')
    .replace(/\s+/g,' ')
    .trim();
}

/* Roman → Arabic */
function romanToInt(roman) {
  const map = {I:1,V:5,X:10,L:50,C:100,D:500,M:1000};
  let num = 0;
  let prev = 0;

  roman = roman.toUpperCase();

  for (let i = roman.length - 1; i >= 0; i--) {
    const curr = map[roman[i]];
    if (!curr) return roman;

    if (curr < prev) num -= curr;
    else num += curr;

    prev = curr;
  }

  return num;
}

/* Arabic → Roman */
function intToRoman(num) {
  const map = [
    [1000,'M'],[900,'CM'],[500,'D'],[400,'CD'],
    [100,'C'],[90,'XC'],[50,'L'],[40,'XL'],
    [10,'X'],[9,'IX'],[5,'V'],[4,'IV'],[1,'I']
  ];

  let result = '';

  for (const [value, numeral] of map) {
    while (num >= value) {
      result += numeral;
      num -= value;
    }
  }

  return result.toLowerCase();
}

function normalizeWithNumbers(text) {

  text = baseNormalize(text);

  const words = text.split(' ');

  const variants = new Set();

  variants.add(text);

  let arabic = words.map(w => {
    if (/^[ivxlcdm]+$/.test(w)) {
      return romanToInt(w);
    }
    return w;
  }).join(' ');

  variants.add(arabic);

  let roman = words.map(w => {
    if (/^\d+$/.test(w)) {
      return intToRoman(parseInt(w));
    }
    return w;
  }).join(' ');

  variants.add(roman);

  return [...variants];
}

searchInput.addEventListener('input', function () {

  const queryVariants = normalizeWithNumbers(this.value);

  tags.forEach(tag => {

    const tagVariants = normalizeWithNumbers(tag.textContent);

    const match = queryVariants.some(q =>
      tagVariants.some(t => t.includes(q))
    );

    tag.parentElement.style.display = match ? '' : 'none';

  });

});
</script>
